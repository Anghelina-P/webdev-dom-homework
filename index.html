<!DOCTYPE html>
<html>
  <head>
    <title>Проект "Комменты"</title>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="styles.css" />
  </head>

  <body>
    <div class="container">
      <ul class="comments">
        <li class="comment">
          <div class="comment-header">
            <div>Глеб Фокин</div>
            <div>12.02.22 12:18</div>
          </div>
          <div class="comment-body">
            <div class="comment-text">
              Это будет первый комментарий на этой странице
            </div>
          </div>
          <div class="comment-footer">
            <div class="likes">
              <span class="likes-counter">3</span>
              <button class="like-button"></button>
            </div>
          </div>
        </li>
        <li class="comment">
          <div class="comment-header">
            <div>Варвара Н.</div>
            <div>13.02.22 19:22</div>
          </div>
          <div class="comment-body">
            <div class="comment-text">
              Мне нравится как оформлена эта страница! ❤
            </div>
          </div>
          <div class="comment-footer">
            <div class="likes">
              <span class="likes-counter">75</span>
              <button class="like-button -active-like"></button>
            </div>
          </div>
        </li>
      </ul>
      <div class="add-form">
        <input
          name="name"
          type="text"
          required
          minlength="2"
          autocomplete="name"
          class="add-form-name"
          placeholder="Введите ваше имя"
        />
        <textarea
          name="comment"
          type="textarea"
          required
          minlength="2"
          autocomplete="off" 
          class="add-form-text"
          placeholder="Введите ваш комментарий"
          rows="4"
        ></textarea>
        <div class="add-form-row">
          <button class="add-form-button">Написать</button>
        </div>
      </div>
    </div>
  </body>

  <script>

    
  const nameInp = document.querySelector('.add-form-name');
  const commInp = document.querySelector('.add-form-text');
  const button = document.querySelector('.add-form-button');
  const commUl = document.querySelector('.comments');

  let comments = [
  {
    name: "Глеб Фокин",
    date: "12.02.22 12:18",
    text: "Это будет первый комментарий",
    likes: 3,
    isLiked: false
  },
  {
    name: "Варвара Н.",
    date: "13.02.22 19:22",
    text: "Мне нравится как оформлена эта страница! ❤",
    likes: 75,
    isLiked: true
  }
];

const likesHandler = () => {
  const likeButtons = document.querySelectorAll('.like-button');
  
  likeButtons.forEach((button, index) => {
    button.addEventListener('click', () => {
      if (comments[index].isLiked) {
        comments[index].isLiked = false;
        comments[index].likes -= 1;
      } else {

        comments[index].isLiked = true;
        comments[index].likes += 1;
      }
      
      renderComments();
    });
  });
};

const renderComments = () => {

  const commentsHtml = comments.map((comment, index) => {

    const likeButtonClass = comment.isLiked ? 'like-button -active-like' : 'like-button';
    
    return `
      <li class="comment" data-index="${index}">
        <div class="comment-header">
          <div>${comment.name}</div>
          <div>${comment.date}</div>
        </div>
        <div class="comment-body">
          <div class="comment-text">
            ${comment.text}
          </div>
        </div>
        <div class="comment-footer">
          <div class="likes">
            <span class="likes-counter">${comment.likes}</span>
            <button class="${likeButtonClass}"></button>
          </div>
        </div>
      </li>
    `;
  }).join('');
  
  commUl.innerHTML = commentsHtml;
  
  likesHandler ();
};

  button.addEventListener('click', () => {

  const name = nameInp.value; 
  const commentText = commInp.value;
  
  const newComment = document.createElement('li');
  newComment.className = 'comment';
  

  if (name === '' || commentText === '') {
    console.log("сперва запоните оба поля");
    return;
  }
  
  const now = new Date();
  const day = now.getDate().toString().padStart(2, '0');        
  const month = (now.getMonth() + 1).toString().padStart(2, '0'); 
  const year = now.getFullYear().toString().slice(-2);          
  const hours = now.getHours().toString().padStart(2, '0');     
  const minutes = now.getMinutes().toString().padStart(2, '0'); 

  const formattedDate = `${day}.${month}.${year} ${hours}:${minutes}`;

  comments.push({
    name: name,
    date: formattedDate,
    text: commentText,
    likes: 0,
    isLiked: false
  });
  
  renderComments();
  
  nameInp.value = '';
  commInp.value = '';
});

renderComments();

  </script>
</html>
